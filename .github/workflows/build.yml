name: Build & Test CRM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Compilation & Vérification TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code (Checkout)
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification des types TypeScript (Lint)
        run: npm run lint

      - name: Compilation de l'application (Build)
        run: npm run build

      - name: Sauvegarde de l'artefact de compilation (dist)
        uses: actions/upload-artifact@v4
        with:
          name: crm-build-dist
          path: dist/
          retention-days: 14
